<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient — deep midnight -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Heart gradient — vibrant indigo to cyan -->
    <linearGradient id="heart" x1="120" y1="100" x2="400" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="35%" stop-color="#6366f1"/>
      <stop offset="70%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Heart inner shine -->
    <linearGradient id="heartShine" x1="180" y1="130" x2="340" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Pulse line gradient -->
    <linearGradient id="pulse" x1="110" y1="270" x2="400" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="85%" stop-color="#e0f2fe" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0"/>
    </linearGradient>

    <!-- AI ring glow -->
    <radialGradient id="aiRing" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="#34d399" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <!-- AI dot -->
    <radialGradient id="aiDot" cx="42%" cy="36%" r="55%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>

    <!-- Shadows -->
    <filter id="heartShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#4f46e5" flood-opacity="0.45"/>
    </filter>
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle grid pattern for background texture -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#grid)"/>

  <!-- Subtle ambient glow behind heart -->
  <ellipse cx="256" cy="260" rx="160" ry="150" fill="#6366f1" opacity="0.08"/>

  <!-- Heart shape -->
  <g filter="url(#heartShadow)">
    <path d="M256 420 C256 420 80 290 80 190 C80 130 120 80 180 80 C215 80 244 100 256 128 C268 100 297 80 332 80 C392 80 432 130 432 190 C432 290 256 420 256 420Z"
          fill="url(#heart)"/>
  </g>

  <!-- Heart inner shine -->
  <path d="M256 420 C256 420 80 290 80 190 C80 130 120 80 180 80 C215 80 244 100 256 128 C268 100 297 80 332 80 C392 80 432 130 432 190 C432 290 256 420 256 420Z"
        fill="url(#heartShine)"/>

  <!-- ECG Pulse line across the heart -->
  <g filter="url(#pulseGlow)">
    <path d="M110 250 L195 250 L215 250 L230 210 L248 300 L266 200 L284 290 L298 250 L318 250 L402 250"
          fill="none" stroke="url(#pulse)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Top-right: AI status indicator -->
  <circle cx="416" cy="96" r="48" fill="url(#aiRing)"/>
  <circle cx="416" cy="96" r="28" fill="url(#aiDot)"/>
  <circle cx="409" cy="89" r="9" fill="white" opacity="0.6"/>

  <!-- Small sparkle dots — neural network vibe -->
  <circle cx="96" cy="96" r="4" fill="#818cf8" opacity="0.35"/>
  <circle cx="80" cy="140" r="3" fill="#6366f1" opacity="0.25"/>
  <circle cx="432" cy="400" r="3.5" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="410" cy="430" r="2.5" fill="#06b6d4" opacity="0.2"/>
</svg>

  <!-- Bottom edge subtle line -->
  <path d="M170 420 Q256 460 342 420" fill="none" stroke="url(#pulse)" stroke-width="2" opacity="0.3"/>
</svg>
