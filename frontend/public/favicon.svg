<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <!-- Cross gradient — subtle warm white -->
    <linearGradient id="crossFill" x1="196" y1="80" x2="316" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>

    <!-- ECG line gradient -->
    <linearGradient id="ecgLine" x1="100" y1="256" x2="412" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.2"/>
      <stop offset="15%" stop-color="#4338ca"/>
      <stop offset="85%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Cross drop shadow -->
    <filter id="crossShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>

    <!-- ECG line glow -->
    <filter id="ecgGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle top-left shine -->
    <radialGradient id="shine" cx="30%" cy="25%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- Subtle glass shine overlay -->
  <rect width="512" height="512" rx="128" fill="url(#shine)"/>

  <!-- Medical cross with shadow -->
  <g filter="url(#crossShadow)">
    <rect x="196" y="80" width="120" height="352" rx="28" fill="url(#crossFill)"/>
    <rect x="80" y="196" width="352" height="120" rx="28" fill="url(#crossFill)"/>
  </g>

  <!-- ECG heartbeat line with glow -->
  <g filter="url(#ecgGlow)">
    <path d="M100 256 L190 256 L220 200 L244 320 L268 190 L292 310 L316 256 L412 256"
          fill="none" stroke="url(#ecgLine)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
